server.port=8080

# Include correlation id in console logs via MDC
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} %-5level [%X{correlationId:-}] %logger{36} - %msg%n

# Keep default logging level
logging.level.root=INFO
logging.level.com.example.summarizer.clients.FirecrawlClient=DEBUG
logging.level.com.example.summarizer.clients.GeminiClient=DEBUG

# Gemini client configuration (override via environment or application.properties)
gemini.apiKey=AIzaSyC4oec2OamJedfCP7Cq-plWy-AMDaQEToU
gemini.model=gemini-flash-latest
gemini.endpoint=https://api.example.com/v1/generate
gemini.maxRetries=2
gemini.provider=google
gemini.useApiKeyAsQuery=true

# Summarizer options
summarizer.batchSize=8
summarizer.promptTemplate=You are an assistant who summarizes technology news into structured bullet points. Use the input JSON array to produce exactly one summary per item.\nAll titles, bullets, and explanations MUST be written in Vietnamese.\nInput items: {items_json}\nReturn ONLY valid JSON using this shape: {"summaries":[{"title":"","url":"","bullets":[""],"why_it_matters":"","type":"news"}]}. Bullets must be concise (max 3). If information is missing, infer carefully or leave an empty string.

# Feed configuration
feeds.techmeme.url=https://www.techmeme.com/feed.xml

# Firecrawl configuration
firecrawl.enabled=true
firecrawl.apiKey=
firecrawl.endpoint=https://api.firecrawl.dev/v2/scrape
firecrawl.onlyMainContent=true
firecrawl.maxAge=172800000
firecrawl.formats=markdown
firecrawl.parsers=
firecrawl.timeoutSeconds=45
firecrawl.minContentLength=100
firecrawl.alwaysRefresh=false

# Location for the SQLite cache storing summaries (absolute or relative)
storage.database-path=data/outputs/summaries.db
